<h2>Definition</h2>
<p>Performs numeric division.</p>

<h2>Type Signatures</h2>
<pre>
(INT, INT) → DEC
(DEC, DEC) → DEC
(INT, DEC) → DEC
</pre>

<h2>Examples</h2>
<pre>
[/]-[10][4] → 2.5
</pre>
