<h1>[R] Root</h1>

<h2>Definition</h2>
<p>Computes the nth root of a number.</p>

<h2>Type Signatures</h2>
<pre>
(INT|DEC, INT|DEC) → INT|DEC
</pre>

<h2>Examples</h2>
<pre>
[R]-[2][9] → 3
[R]-[3][27] → 3
</pre>
