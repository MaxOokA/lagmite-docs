<h1>[*] Multiplication</h1>

<h2>Definition</h2>
<p>Performs numeric multiplication or string repetition.</p>

<h2>Type Signatures</h2>
<pre>
(INT, INT) → INT
(DEC, DEC) → DEC
(INT, DEC) → DEC
(STR, INT) → STR
(INT, STR) → STR
</pre>

<h2>Examples</h2>
<pre>
[*]-[5][2] → 10
[*]-["A"][3] → "AAA"
</pre>
